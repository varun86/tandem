manifest_schema_version: 1
pack_id: "tpk_slack_release_notes_writer_v1"
name: slack-release-notes-writer
version: 0.1.0
type: workflow
engine:
  requires: ">=0.4.0 <2.0.0"

entrypoints:
  missions: ["release_notes_publish"]
  routines: ["manual_release_publish"]

capabilities:
  required:
    - github.list_commits
    - slack.post_message
  optional:
    - github.create_pull_request
  non_portable: []

secrets:
  required:
    - key: GITHUB_TOKEN
      description: "Token for commit/changelog reads"
    - key: SLACK_TOKEN
      description: "Bot token to post release notes"

contents:
  agents:
    - id: release_writer
      path: agents/release_writer.md
  missions:
    - id: release_notes_publish
      path: missions/release_notes_publish.yaml
  routines:
    - id: manual_release_publish
      path: routines/manual_release_publish.yaml
